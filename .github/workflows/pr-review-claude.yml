name: PR Review (Claude + Bedrock)
 
on:
  pull_request:
    types: [opened, ready_for_review, synchronize, reopened]

permissions:
  id-token: write
  contents: read
  pull-requests: write
 
jobs:
  review:
    runs-on: ubuntu-latest
 
    steps:
      - uses: actions/checkout@v4
 
      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: us-east-1
 
      - uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          use_bedrock: "true"
          show_full_output: true
          claude_args: |
            --model us.anthropic.claude-haiku-4-5-20251001-v1:0
            --max-turns 10
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr comment:*),Bash(gh pr list),Skill"
          plugin_marketplaces: "https://github.com/anthropics/claude-plugins-official.git"
          plugins: "pr-review-toolkit@claude-plugins-official"
          prompt: "Review the current pull request changes"